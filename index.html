<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PEA Buachet - Communication Inspection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Sarabun', sans-serif; 
      background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb); 
      background-size: 400% 400%; 
      animation: gradient 15s ease infinite; 
      min-height: 100vh; 
      padding: 15px; 
    }
    @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .glass-card { 
      background: rgba(255, 255, 255, 0.9); 
      backdrop-filter: blur(15px); 
      border-radius: 2rem; 
      border: 1px solid rgba(255, 255, 255, 0.5); 
      box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
    }
    .field-label { 
      display: block; 
      font-weight: 700; 
      color: #4a5568; 
      font-size: 0.85rem; 
      margin-bottom: 0.4rem; 
      margin-left: 0.2rem;
    }
    .input-box { 
      width: 100%; 
      padding: 12px 16px; 
      border-radius: 1rem; 
      border: 2px solid #edf2f7; 
      background: #f8fafc;
      transition: all 0.3s ease; 
      outline: none;
    }
    .input-box:focus { 
      border-color: #a1c4fd; 
      background: white;
      box-shadow: 0 0 15px rgba(161, 196, 253, 0.3); 
    }
    .btn-gradient {
      background: linear-gradient(90deg, #667eea, #764ba2, #e73c7e);
      color: white; font-weight: 800; padding: 18px; border-radius: 1.2rem; 
      width: 100%; transition: 0.4s; box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
    }
    .btn-gradient:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(118, 75, 162, 0.4); opacity: 0.9; }
    .rainbow-border { border: 2px dashed #cbd5e0; background: rgba(255,255,255,0.5); }
  </style>
</head>
<body>

<div class="glass-card max-w-2xl mx-auto p-6 md:p-10">
  <header class="text-center mb-8">
    <h1 class="text-2xl font-black text-gray-800 tracking-tight">📝  ระบบจัดเก็บข้อมูลสายสื่อสาร</h1>
    <p class="text-blue-500 font-bold text-sm">บันทึกข้อมูลและภาพถ่ายพร้อมพิกัด (External Source)</p>
  </header>

  <form id="inspectionForm" class="space-y-5">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div>
        <label class="field-label">🏘️ ตำบล</label>
        <select name="subdistrict" id="subdistrict" class="input-box" required>
          <option value="">-- โปรดเลือกตำบล --</option>
          <option>บัวเชด</option><option>สะเดา</option><option>จรัส</option>
          <option>อาโพน</option><option>สำเภาลูน</option><option>ตาวัง</option>
        </select>
      </div>
      <div>
        <label class="field-label">🛣️ เส้นทาง สถานที่+(ละเมิด ชื่อบริษัท/พ.ศ.) </label>
        <input type="text" name="route" class="input-box" placeholder="บ.หมื่นสังข์ ต.บัวเชด +(ละเมิด TTT/69)" required>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div>
        <label class="field-label">🗼 เลขลำดับสายในแผนผัง</label>
        <input type="text" name="poleId" id="poleId" class="input-box" placeholder=" ใส่ตัวเลข" required>
      </div>
      <div>
        <label class="field-label">🏢 บริษัทเจ้าของสาย</label>
        <input type="text" name="owner" class="input-box" placeholder="TRUE / NT / AIS" required>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div>
        <label class="field-label">⛓️ ชนิดสายหลัก</label>
        <select name="cableMainType" id="cableMainType" class="input-box" onchange="updateSubTypes()" required>
          <option value="">-- เลือกชนิดสายหลัก --</option>
          <option value="สายทองแดง">สายทองแดง</option>
          <option value="สายใยแก้วนำแสง">สายใยแก้วนำแสง</option>
        </select>
      </div>
      <div>
        <label class="field-label">📁 ประเภทสายย่อย</label>
        <select name="cableSubType" id="cableSubType" class="input-box" required>
          <option value="">-- รอเลือกชนิดสายหลัก --</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-3 bg-white/50 p-4 rounded-2xl border border-white">
      <div>
        <label class="field-label text-[13px] text-center">📏 เส้นผ่าศูนย์กลาง(มม.)</label>
        <input type="text" name="diameter" class="input-box text-center" placeholder="0.00">
      </div>
      <div>
        <label class="field-label text-[13px] text-center">🔢 จำนวนเส้น</label>
        <input type="text" name="quantity" class="input-box text-center" placeholder="0">
      </div>
      <div>
        <label class="field-label text-[13px] text-center">🔌 จำนวนคอร์ (Core)</label>
        <input type="text" name="coreCount" class="input-box text-center" placeholder="0">
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
      <div class="p-4 rainbow-border rounded-2xl text-center">
        <label class="field-label text-purple-600">📸 ภาพถ่ายที่ 1</label>
        <input type="file" id="file1" accept="image/*" capture="camera" class="text-xs w-full mt-2" required>
        <div id="pre1" class="hidden mt-3 rounded-lg overflow-hidden border-2 border-white shadow-md"><img id="img1" class="w-full"></div>
      </div>
      <div class="p-4 rainbow-border rounded-2xl text-center">
        <label class="field-label text-blue-600">📸 ภาพถ่ายที่ 2</label>
        <input type="file" id="file2" accept="image/*" capture="camera" class="text-xs w-full mt-2">
        <div id="pre2" class="hidden mt-3 rounded-lg overflow-hidden border-2 border-white shadow-md"><img id="img2" class="w-full"></div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div>
        <label class="field-label">📍 พิกัด Latitude, Longitude</label>
        <input type="text" name="location" id="location" class="input-box bg-gray-100 text-xs italic" readonly placeholder="กำลังจับสัญญาณ GPS...">
      </div>
      <div>
        <label class="field-label">👷 ชื่อผู้บันทึก</label>
        <input type="text" name="recorder" class="input-box" placeholder="ระบุชื่อพนักงาน" required>
      </div>
    </div>

    <button type="submit" id="submitBtn" class="btn-gradient text-lg">🚀 บันทึกข้อมูล</button>
  </form>
  
  <canvas id="canvas" class="hidden"></canvas>

<footer class="mt-8 text-center text-[10px] font-bold text-gray-400">
    ⚡️ Design & System by PEA Buachet ⚡️
  </footer>
</div>

<script>
  // ** ระบุ URL ของ Google Apps Script Web App ที่นี่ **
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx9rsBgP8eThmwbatJEcCYBstRmU4wOyb8IV4ms6g5aQupN4Ytn0EiZaMnX2KZQjA/exec";

  const subTypes = {
    "สายทองแดง": ["CU", "Dropwire", "Coaxial"],
    "สายใยแก้วนำแสง": ["Dropwire", "Fig.8", "ADSS", "ARSS"]
  };

  function updateSubTypes() {
    const main = document.getElementById('cableMainType').value;
    const sub = document.getElementById('cableSubType');
    sub.innerHTML = '<option value="">-- เลือก --</option>';
    if (main) subTypes[main].forEach(t => sub.innerHTML += `<option value="${t}">${t}</option>`);
  }

  window.onload = () => {
    document.getElementById('subdistrict').value = localStorage.getItem('lastSub') || "";
    document.getElementsByName('route')[0].value = localStorage.getItem('lastRoute') || "";
    document.getElementsByName('recorder')[0].value = localStorage.getItem('lastRec') || "";
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(p => {
        document.getElementById('location').value = `${p.coords.latitude}, ${p.coords.longitude}`;
      }, null, {enableHighAccuracy: true});
    }
  };

  function processImg(fileInput, imgDisplay, container) {
    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.getElementById('canvas');
          const ctx = canvas.getContext('2d');
          const scale = Math.min(1200 / img.width, 1);
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          
          const fontSize = canvas.width * 0.035;
          ctx.fillStyle = "rgba(0,0,0,0.6)";
          ctx.fillRect(0, canvas.height - (fontSize * 5), canvas.width, fontSize * 5);
          ctx.fillStyle = "#ffffff";
          ctx.font = `bold ${fontSize}px Sarabun`;
          
          ctx.fillText(`📅 ${new Date().toLocaleString('th-TH')}`, 25, canvas.height - (fontSize * 3.3));
          ctx.fillText(`📍 ${document.getElementById('location').value}`, 25, canvas.height - (fontSize * 1.9));
          ctx.fillText(`🛣️ ${document.getElementsByName('route')[0].value}`, 25, canvas.height - (fontSize * 0.7));
          
          imgDisplay.src = canvas.toDataURL('image/jpeg', 0.8);
          container.classList.remove('hidden');
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  processImg(document.getElementById('file1'), document.getElementById('img1'), document.getElementById('pre1'));
  processImg(document.getElementById('file2'), document.getElementById('img2'), document.getElementById('pre2'));

  document.getElementById('inspectionForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = "⌛ กำลังบันทึกข้อมูล...";

    const formData = {
      subdistrict: document.getElementById('subdistrict').value,
      route: this.route.value,
      poleId: document.getElementById('poleId').value,
      owner: this.owner.value,
      cableMainType: document.getElementById('cableMainType').value,
      cableSubType: document.getElementById('cableSubType').value,
      diameter: this.diameter.value,
      quantity: this.quantity.value,
      coreCount: this.coreCount.value,
      location: document.getElementById('location').value,
      recorder: this.recorder.value,
      image1: document.getElementById('img1').src,
      image2: document.getElementById('img2').src
    };

    localStorage.setItem('lastSub', formData.subdistrict);
    localStorage.setItem('lastRoute', formData.route);
    localStorage.setItem('lastRec', formData.recorder);

    try {
      // ส่งข้อมูลไปยัง Web App URL โดยใช้ fetch API
      const response = await fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors', // สำคัญ: เพื่อข้ามปัญหา CORS เมื่อส่งจาก GitHub
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(formData)
      });

      // เนื่องจากใช้ no-cors เราจะไม่สามารถอ่าน JSON ผลลัพธ์ได้ตรงๆ 
      // แต่ข้อมูลจะถูกส่งไปประมวลผลที่ Apps Script แน่นอน
      alert("✅ บันทึกข้อมูลเรียบร้อยแล้ว!");
      
      // ล้างค่าฟอร์มบางส่วน
      document.getElementById('poleId').value = "";
      document.getElementById('pre1').classList.add('hidden');
      document.getElementById('pre2').classList.add('hidden');
      document.getElementById('file1').value = "";
      document.getElementById('file2').value = "";
      btn.disabled = false;
      btn.innerHTML = "🚀 บันทึกต้นถัดไป";
      window.scrollTo({ top: 0, behavior: 'smooth' });

    } catch (error) {
      console.error("Error:", error);
      alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อกรุณาตรวจสอบ URL ของคุณ");
      btn.disabled = false;
      btn.innerHTML = "🚀 บันทึกข้อมูล";
    }
  });
</script>
</body>
</html>
