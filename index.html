<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบบันทึกสายสื่อสาร</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Sarabun', sans-serif;
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 650px;
    }

    .input-field {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 1rem;
      transition: all 0.3s;
      outline: none;
      background: #f8fafc;
    }

    .input-field:focus {
      border-color: #805ad5;
      background: white;
      box-shadow: 0 0 0 4px rgba(128, 90, 213, 0.15);
    }

    .label-text {
      font-weight: 600;
      color: #4a5568;
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-rainbow {
      background: linear-gradient(90deg, #667eea, #764ba2, #e73c7e, #ee7752);
      background-size: 300% 100%;
      transition: all 0.4s ease-in-out;
      color: white;
      font-weight: 700;
      padding: 1rem;
      border-radius: 1rem;
      width: 100%;
      margin-top: 1rem;
    }

    .btn-rainbow:hover {
      background-position: 100% 0;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    
    /* สไตล์เพิ่มเติมสำหรับ Preview */
    #previewContainer {
      display: none;
      margin-top: 1rem;
      border-radius: 1rem;
      overflow: hidden;
      border: 3px solid white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<div class="glass-panel p-6 md:p-10">
  <div class="text-center mb-8">
    <h1 class="text-3xl font-bold text-gray-800 tracking-tight">📝 ระบบตรวจสอบสายสื่อสาร</h1>
    <p class="text-gray-500 text-sm mt-1 font-medium">บันทึกข้อมูลและภาพถ่ายพร้อมพิกัด</p>
  </div>

  <form id="inspectForm" class="space-y-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="label-text">🏘️ ตำบล</label>
        <select name="subdistrict" id="subdistrict" class="input-field" required>
          <option value="">เลือกตำบล</option>
          <option>บัวเชด</option><option>สะเดา</option><option>จรัส</option>
          <option>อาโพน</option><option>สำเภาลูน</option><option>ตาวัง</option>
        </select>
      </div>
      <div>
        <label class="label-text">🛣️ เส้นทาง / สถานที+(ละเมิด ชื่อตัวย่อบริษัท/ปี พ.ศ.) </label>
        <input type="text" name="route" class="input-field" placeholder="บ.หมื่นสังข์ ต.บัวเชด +(ละเมิด TTT/69)าง" required>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="label-text">🗼 ลำดับเสาไฟฟ้า</label>
        <input type="text" name="poleId" id="poleId" class="input-field" placeholder="ใส่ตัวเลข" required>
      </div>
      <div>
        <label class="label-text">🏢 เจ้าของสาย</label>
        <input type="text" name="owner" class="input-field" placeholder="เช่น PEA / NT / AIS" required>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="label-text">⛓️ ชนิดสายหลัก</label>
        <select name="cableMainType" id="cableMainType" onchange="updateSubTypes()" class="input-field" required>
          <option value="">เลือกชนิดหลัก</option>
          <option value="สายทองแดง">สายทองแดง</option>
          <option value="สายใยแก้วนำแสง">สายใยแก้วนำแสง</option>
        </select>
      </div>
      <div>
        <label class="label-text">📁 ประเภทสายย่อย</label>
        <select name="cableSubType" id="cableSubType" class="input-field" required>
          <option value="">-- รอเลือก --</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-3 bg-white/50 p-3 rounded-2xl border border-gray-100">
      <div>
        <label class="label-text text-[10px]">📏 ศก.(มม.)</label>
        <input type="text" step="0.01" placeholder="0.01" name="diameter" class="input-field px-2">
      </div>
      <div>
        <label class="label-text text-[10px]">🔢 จำนวนเส้น</label>
        <input type="text" name="quantity" class="input-field px-2" placeholder="0">
      </div>
      <div>
        <label class="label-text text-[10px]">🧶 จำนวน Core</label>
        <input type="text" name="coreCount" class="input-field px-2" placeholder="0">
      </div>
    </div>

    <div class="p-4 bg-purple-50 rounded-2xl border-2 border-dashed border-purple-200">
      <label class="label-text text-purple-700 font-bold">📸 ถ่ายภาพตรวจสอบ (Auto Stamp)</label>
      <input type="file" id="fileInput" accept="image/*" capture="camera" class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-purple-600 file:text-white hover:file:bg-purple-700" required>
      
      <div id="previewContainer">
        <img id="imagePreview" src="" alt="ภาพตัวอย่าง" class="w-full h-auto">
      </div>
      
      <canvas id="canvas" class="hidden"></canvas>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
      <div>
        <label class="label-text">📍 พิกัด (ดึงอัตโนมัติ)</label>
        <input type="text" name="location" id="location" class="input-field text-xs bg-gray-100 italic" readonly>
      </div>
      <div>
        <label class="label-text">👷 ผู้บันทึก</label>
        <input type="text" name="recorder" class="input-field" placeholder="ชื่อเล่น/รหัส" required>
      </div>
    </div>

    <button type="submit" id="submitBtn" class="btn-rainbow text-lg shadow-xl">
      🚀 บันทึกและตรวจต้นถัดไป
    </button>
  </form>
</div>

<script>
  const subTypesMap = {
    "สายทองแดง": ["CU", "Dropwire", "Coaxial"],
    "สายใยแก้วนำแสง": ["Dropwire", "Fig.8", "ADSS", "ARSS"]
  };

  function updateSubTypes() {
    const main = document.getElementById('cableMainType').value;
    const sub = document.getElementById('cableSubType');
    sub.innerHTML = '<option value="">-- เลือกประเภท --</option>';
    if (main) {
      subTypesMap[main].forEach(t => {
        sub.innerHTML += `<option value="${t}">${t}</option>`;
      });
    }
  }

  window.onload = function() {
    document.getElementById('subdistrict').value = localStorage.getItem('last_sub') || "";
    document.getElementsByName('route')[0].value = localStorage.getItem('last_route') || "";
    document.getElementsByName('recorder')[0].value = localStorage.getItem('last_rec') || "";
    
    navigator.geolocation.getCurrentPosition(p => {
      document.getElementById('location').value = `${p.coords.latitude}, ${p.coords.longitude}`;
    }, e => {
      document.getElementById('location').value = "ไม่สามารถระบุพิกัดได้";
    });
  };

  // ฟังก์ชันวาด Stamp และ Preview
  document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 1. ขนาดภาพ
        const maxWidth = 2000; 
        const scale = Math.min(maxWidth / img.width, 1);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        
        // 2. การตั้งค่าดีไซน์ Stamp
        const baseSize = canvas.width * 0.025;
        const padding = baseSize;
        const lineHeight = baseSize * 1.6;
        
        // 3. วาดพื้นหลังโปร่งแสง Glass Effect
        const grad = ctx.createLinearGradient(0, canvas.height - (lineHeight * 4.5), 0, canvas.height);
        grad.addColorStop(0, 'rgba(0, 0, 0, 0)');
        grad.addColorStop(0.2, 'rgba(0, 0, 0, 0.6)');
        grad.addColorStop(1, 'rgba(0, 0, 0, 0.8)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, canvas.height - (lineHeight * 4.5), canvas.width, lineHeight * 4.5);
        
        // 4. เขียนข้อความ
        ctx.font = `bold ${baseSize}px 'Sarabun'`;
        ctx.fillStyle = "white";
        ctx.shadowColor = "rgba(0,0,0,0.8)";
        ctx.shadowBlur = 8;
        
        const now = new Date().toLocaleString('th-TH', { 
            year: 'numeric', month: 'long', day: 'numeric', 
            hour: '2-digit', minute: '2-digit', second: '2-digit' 
        });
        const loc = document.getElementById('location').value;
        const route = document.getElementsByName('route')[0].value || "ไม่ได้ระบุเส้นทาง";
        
        ctx.fillText(`📅 วันเวลา: ${now}`, padding, canvas.height - (lineHeight * 2.8));
        ctx.fillText(`📍 พิกัด: ${loc}`, padding, canvas.height - (lineHeight * 1.7));
        ctx.fillText(`🛣️ สถานที่: ${route}`, padding, canvas.height - (lineHeight * 0.6));

        // 5. แสดงภาพในส่วน Preview
        const previewImg = document.getElementById('imagePreview');
        previewImg.src = canvas.toDataURL('image/jpeg', 0.8);
        document.getElementById('previewContainer').style.display = 'block';
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('inspectForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = "⌛ กำลังอัปโหลด...";

    const canvas = document.getElementById('canvas');
    const formData = {
      subdistrict: document.getElementById('subdistrict').value,
      route: document.getElementsByName('route')[0].value,
      poleId: document.getElementById('poleId').value,
      cableMainType: document.getElementById('cableMainType').value,
      cableSubType: document.getElementById('cableSubType').value,
      diameter: document.getElementsByName('diameter')[0].value,
      quantity: document.getElementsByName('quantity')[0].value,
      coreCount: document.getElementsByName('coreCount')[0].value,
      owner: document.getElementsByName('owner')[0].value,
      location: document.getElementById('location').value,
      recorder: document.getElementsByName('recorder')[0].value,
      image: canvas.toDataURL('image/jpeg', 0.8)
    };

    localStorage.setItem('last_sub', formData.subdistrict);
    localStorage.setItem('last_route', formData.route);
    localStorage.setItem('last_rec', formData.recorder);

    if (typeof google !== 'undefined') {
        google.script.run.withSuccessHandler(function() {
            resetForm(btn);
        }).processForm(formData);
    } else {
        console.log("Submit Data:", formData);
        setTimeout(() => resetForm(btn), 1000);
    }
  });

  function resetForm(btn) {
    document.getElementById('inspectForm').reset();
    document.getElementById('previewContainer').style.display = 'none';
    document.getElementById('subdistrict').value = localStorage.getItem('last_sub');
    document.getElementsByName('route')[0].value = localStorage.getItem('last_route');
    document.getElementsByName('recorder')[0].value = localStorage.getItem('last_rec');
    btn.disabled = false;
    btn.innerHTML = "🚀 บันทึกและตรวจต้นถัดไป";
    window.scrollTo({ top: 0, behavior: 'smooth' });
    alert("✅ บันทึกเรียบร้อย!");
  }
  
  
</script>

<div style="
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 1000; /* ให้อยู่ชั้นบนสุดเสมอ */
    padding: 10px 0;
    background: rgba(255, 255, 255, 0.15); /* พื้นหลังใสแบบกระจก */
    backdrop-filter: blur(10px); /* เอฟเฟกต์เบลอพื้นหลัง */
    -webkit-backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255, 255, 255, 0.2);
    text-align: center;
    pointer-events: none; /* ไม่ให้ไปขวางการกดปุ่มบันทึกที่อยู่ด้านหลัง */
">
    <p style="
        margin: 0;
        font-family: 'Sarabun', sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.5px;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
        /* การไล่สีพาสเทลแบบ Rainbow */
        background: linear-gradient(90deg, #ffb3ba, #ffdfba, #ffffba, #baffc9, #bae1ff, #ffb3ba);
        background-size: 200% auto;
        animation: pastelFlow 4s linear infinite; /* ให้สีไหลวนต่อเนื่อง */
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    ">

        <span>⚡️ Copyright : Design by PEA Buachet ⚡️</span>

    </p>
</div>

<style>
    /* อนิเมชั่นให้สีพาสเทลไหลลื่น */
    @keyframes pastelFlow {
        to { background-position: 200% center; }
    }
    /* สำคัญมาก: เว้นระยะด้านล่างของ Body เพื่อไม่ให้ Footer ไปทับเนื้อหาฟอร์มตอนเลื่อนลงสุด */
    body { 
        padding-bottom: 50px !important; 
    }
</style>

</body>
</html>
